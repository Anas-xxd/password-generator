<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Karla:wght@200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="border">
            <div>
                <h1>
                    Generate a <br> <span id="green">random password</span>
                </h1>
                
                <div>
                    <p>Never use an insecure password again.</p>
                </div>
                
                <div id="gen-btn-box">
                    <button id="gen-btn" onclick="genPasswords()">Generate passwords</button>
                    <button id="menu-btn">☰</button>
                </div>
            </div>
            
            <div id="side-bar">
                <div id="side-bar-items">
                    <h2>Settings</h2>
                    
                    <div id="side-bar-boxes">
                        <div>
                            <label>
                                <input type="checkbox" id="numbers" checked>
                                Include Numbers
                            </label>
                        </div>
                        
                        <div>
                            <label>
                                <input type="checkbox" id="symbols" checked>
                                Include Symbols
                            </label>
                        </div>
                        
                        <div id="range">
                            <label>
                                Number of charctars
                                <input type="range" id="char-num" min="8" max="20" step="1">
                                <output id="value"></output>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="overlay"></div>
            <div id="horizontal-line"></div>
            <div id="boxes">
                <div class="text-box" id="first-box"></div>
                <div class="text-box" id="second-box"></div>
            </div>
        </div>
        
        <script src="index.js"></script>
    </body>
</html>
